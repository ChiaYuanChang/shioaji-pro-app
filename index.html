<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/shioaji-logo.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <title>Shioaji Pro — 交易終端</title>
        <!--
            white-screen guard (#4): ES5 only — must parse on the oldest
            WKWebView. If the bundle dies before React mounts (SyntaxError /
            ReferenceError on old Safari), show the error instead of a blank
            page. Never fires once #root has content.
        -->
        <script>
            (function () {
                var shown = false;
                function rootIsEmpty() {
                    var root = document.getElementById('root');
                    return !root || root.childNodes.length === 0;
                }
                function showBootError(message) {
                    // defer + re-check so a benign early rejection racing
                    // React's first commit doesn't flash a false error page
                    setTimeout(function () {
                        renderBootError(message);
                    }, 250);
                }
                function renderBootError(message) {
                    if (shown || !rootIsEmpty() || !document.body) return;
                    shown = true;
                    var box = document.createElement('div');
                    box.setAttribute(
                        'style',
                        'position:fixed;top:0;left:0;right:0;bottom:0;' +
                            'background:#101418;color:#e6e9ec;' +
                            'font-family:Menlo,Monaco,monospace;font-size:13px;' +
                            'padding:32px;box-sizing:border-box;overflow:auto;' +
                            'z-index:2147483647;line-height:1.6',
                    );
                    var title = document.createElement('div');
                    title.setAttribute(
                        'style',
                        'font-size:16px;font-weight:bold;color:#ff6b6b;' +
                            'margin-bottom:12px',
                    );
                    title.appendChild(
                        document.createTextNode(
                            'Shioaji Pro 啟動失敗 (startup failed)',
                        ),
                    );
                    var msg = document.createElement('pre');
                    msg.setAttribute(
                        'style',
                        'white-space:pre-wrap;word-break:break-word;' +
                            'background:#1a2026;border:1px solid #2a323a;' +
                            'border-radius:6px;padding:12px;margin:0 0 16px 0;' +
                            'color:#ffd166',
                    );
                    msg.appendChild(document.createTextNode(message));
                    var hint = document.createElement('div');
                    hint.setAttribute('style', 'color:#9aa4ad');
                    hint.appendChild(
                        document.createTextNode(
                            '請將上方錯誤訊息截圖回報至 ' +
                                'github.com/Sinotrade/shioaji-pro-app/issues',
                        ),
                    );
                    box.appendChild(title);
                    box.appendChild(msg);
                    box.appendChild(hint);
                    document.body.appendChild(box);
                }
                window.onerror = function (message, source, line, col, error) {
                    var text = String(message || 'Unknown error');
                    if (source) {
                        text +=
                            '\n' +
                            String(source) +
                            ':' +
                            String(line || 0) +
                            ':' +
                            String(col || 0);
                    }
                    if (error && error.stack) {
                        text += '\n' + String(error.stack);
                    }
                    // bundle may fail before DOM is ready on old engines
                    if (document.body) {
                        showBootError(text);
                    } else if (window.addEventListener) {
                        window.addEventListener('DOMContentLoaded', function () {
                            showBootError(text);
                        });
                    }
                    return false;
                };
                if (window.addEventListener) {
                    window.addEventListener(
                        'unhandledrejection',
                        function (event) {
                            var reason =
                                event && event.reason
                                    ? event.reason.stack ||
                                      event.reason.message ||
                                      String(event.reason)
                                    : 'Unhandled promise rejection';
                            showBootError(String(reason));
                        },
                    );
                }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
